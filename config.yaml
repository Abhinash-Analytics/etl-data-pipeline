# ==========================================================
# Handle missing value CONFIGURATION
# ==========================================================
changes:
  - type: StandardizeColumns

  - type: ToNumeric
    column: [tenure, monthlycharges, totalcharges]

  - type: HandleIntegerMissingValues
    column: totalcharges

  - type: DropNull

  - type: DropColumn
    column: customerid

  - type: Encoding
# ==========================================================
# Validation CONFIGURATION
# ==========================================================
validation:
  threshold: 0.1
  missing_values:
    replace_with_nan: [" ", "", "NA", "null"]
  rules:
    - column: tenure
      condition: "< 0"

    - column: monthlycharges
      condition: "<= 0"

    - column: totalcharges
      condition: "<= 0"

    - column: churn
      condition: "map:Yes=1,No=0"

# ==========================================================
# Logging CONFIGURATION
# ==========================================================
logging:
  log_file: log/pipeline.log