# ==========================================================
# Data source CONFIGURATION
# ==========================================================
data_source:
  - type: csv
    input_path: data/raw/Telco Customer Churn.csv
    output_path: data/processed/processed_data.csv

  - type: db
    db_name: postgres
    user_name: postgres
    password: root
    host: localhost
    port: 5432
    query: SELECT * FROM telco_customer_churn
    table: processed_telco_customer_churn

  - type: json
    input_path: data/raw/telco_customer_churn.json
    output_path: data/processed/processed_telco_customer_churn.json

# ==========================================================
# Output CONFIGURATION 
# ==========================================================
dropped_records: data/dropped/dropped_records.csv
